spring.application.name=attendance-system

# ===== 1. 数据源配置 =====
# 指定数据库连接URL，其中 'attendance_system' 是你的数据库名
spring.datasource.url=jdbc:postgresql://localhost:5432/attendance_system
# 数据库用户名
spring.datasource.username=postgres
# 数据库密码，请替换为你自己的密码
spring.datasource.password=wj42411061
# PostgreSQL驱动类名
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== 2. JPA 配置 =====
# 设置数据库方言为 PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# 控制台打印SQL语句，便于调试
spring.jpa.show-sql=true
# 设置DDL策略为 update，Hibernate会根据实体自动更新表结构
spring.jpa.hibernate.ddl-auto=update
# 设置SQL语句的格式化输出
spring.jpa.properties.hibernate.format_sql=true